version: "3.9"

services:
  # ── Frontend: Next.js 14 App Router ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: grantai-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_AI_ENGINE_URL=http://localhost:8000
    depends_on:
      - backend
      - ai-engine
    networks:
      - grantai-network
    restart: unless-stopped

  # ── Backend: Spring Boot ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grantai-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/grantai
      - SPRING_DATASOURCE_USERNAME=grantai
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-grantai_dev_secret}
      - AI_ENGINE_URL=http://ai-engine:8000
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production_32_chars_min}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantai-network
    restart: unless-stopped

  # ── AI Engine: FastAPI ──────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: grantai-ai-engine
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_ENGINE_API_KEY=${AI_ENGINE_API_KEY:-grantai_dev_ai_key}
      - DATABASE_URL=postgresql://grantai:${POSTGRES_PASSWORD:-grantai_dev_secret}@postgres:5432/grantai
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grantai-network
    volumes:
      - ./ai-engine:/app
    restart: unless-stopped

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grantai-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=grantai
      - POSTGRES_USER=grantai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-grantai_dev_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantai -d grantai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grantai-network
    restart: unless-stopped

  # ── Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grantai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grantai-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  grantai-network:
    driver: bridge
